# Per-tech-area UI defaults for the queue app.
# default_user: initial value for the User field
#   (empty string ⇒ use the logged-in user's login)
# default_polarities: polarities pre-checked in the polarity group
# bfabric_areas: B-Fabric "Area" values whose orders belong to this tech area
#   (used to filter the order browser; empty ⇒ no filtering)
# sample_name_suffixes: prep-type labels offered in the sample-name suffix dropdown
#   (appended as _<suffix> to every sample name; empty ⇒ only the "none" no-op)
# allow_no_layout: offer the synthetic "no_layout" (as-is, no QC) option for this
#   tech area, for both Vial and Plate queues (omitted ⇒ true)

[Proteomics]
default_user = "analytic"
default_polarities = ["pos"]
bfabric_areas = ["Proteomics"]
sample_name_suffixes = ["enriched", "total", "lip"]
allow_no_layout = false

[Metabolomics]
default_user = ""
default_polarities = ["pos", "neg"]
bfabric_areas = ["Metabolomics/Biophysics"]

[Lipidomics]
default_user = ""
default_polarities = ["pos", "neg"]
bfabric_areas = ["Metabolomics/Biophysics"]

[Testing]
default_user = ""
default_polarities = ["pos"]
bfabric_areas = []
