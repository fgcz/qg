# QC Layouts
# QC sample positions per physical sampler + area/workflow
#
# Key format: [sampler_base.area]
#   sampler_base = physical sampler without software suffix (e.g., "Vanquish_Vial")
#   area = workflow type from instruments.toml (e.g., "Proteomics", "Metabolomics")
#
# Grid samplers: qc_positions = { sample_id = "position_string" }
# Evosep samplers: qc_trays = { sample_id = { tray, position_start, position_end } }

# =============================================================================
# Vanquish Vial Layouts
# QC row: F, QC plate: B
# =============================================================================

[Vanquish_Vial.Proteomics]
QC01 = "B:F9"
QC03dia = "B:F8"
QC03dda = "B:F8"
clean = "B:F7"

[Vanquish_Vial.Metabolomics]
blank = "B:F9"
pooledQC = "B:F8"
standard = "B:F7"
pooledQCDil1 = "B:F6"
pooledQCDil2 = "B:F5"
pooledQCDil3 = "B:F4"
pooledQCDil4 = "B:F3"
pooledQCDil5 = "B:F2"
pooledQCDil6 = "B:F1"
EquiSPLASH = "B:F7"
108mix_AA = "B:F7"
108mix_OAP = "B:F7"

# =============================================================================
# Vanquish Plate Layouts
# QC row: H, QC plate: B
# =============================================================================

[Vanquish_Plate.Proteomics]
QC01 = "B:H9"
QC03dia = "B:H10"
QC03dda = "B:H10"
clean = "B:H1"

[Vanquish_Plate.Metabolomics]
blank = "B:H1"
pooledQC = "B:H9"
standard = "B:H12"
NIST = "B:H11"
pooledQCDil1 = "B:H2"
pooledQCDil2 = "B:H3"
pooledQCDil3 = "B:H4"
pooledQCDil4 = "B:H5"
pooledQCDil5 = "B:H6"
pooledQCDil6 = "B:H7"
EquiSPLASH = "B:H12"
108mix_AA = "B:H12"
108mix_OAP = "B:H12"

# =============================================================================
# MClass48 Vial Layouts
# QC row: F, QC plate: 1
# =============================================================================

[MClass48_Vial.Proteomics]
