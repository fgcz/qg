QC03dia = "1:F,7"
QC03dda = "1:F,7"
clean = "1:F,6"

[MClass48_Vial.Metabolomics]
blank = "1:F,8"
pooledQC = "1:F,7"
standard = "1:F,6"
pooledQCDil1 = "1:F,5"
pooledQCDil2 = "1:F,4"
pooledQCDil3 = "1:F,3"
pooledQCDil4 = "1:F,2"
pooledQCDil5 = "1:F,1"
pooledQCDil6 = "2:F,8"
EquiSPLASH = "1:F,6"
108mix_AA = "1:F,6"
108mix_OAP = "1:F,6"

# =============================================================================
# MClass48 Plate Layouts
# QC row: F, QC plate: 1
# =============================================================================

[MClass48_Plate.Proteomics]
QC01 = "1:F,8"
QC03dia = "1:F,7"
QC03dda = "1:F,7"
clean = "1:F,6"

[MClass48_Plate.Metabolomics]
blank = "1:F,8"
pooledQC = "1:F,7"
standard = "1:F,6"
NIST = "1:F,5"
pooledQCDil1 = "1:F,4"
pooledQCDil2 = "1:F,3"
pooledQCDil3 = "1:F,2"
pooledQCDil4 = "1:F,1"
pooledQCDil5 = "2:F,8"
pooledQCDil6 = "2:F,7"
