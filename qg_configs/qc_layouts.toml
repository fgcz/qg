108mix_OAP = "1:F,6"

# =============================================================================
# Evosep Layouts (Vial and Plate share same tray structure)
# QC samples use dedicated trays with position counters
# Tray 5: QC samples, Tray 6: Clean/wash
# =============================================================================

[Evosep.Proteomics]
# Position ranges within dedicated trays
autoQC01 = { tray = 5, position_start = 1, position_end = 48 }
autoQC03dia = { tray = 5, position_start = 49, position_end = 96 }
autoQC03dda = { tray = 5, position_start = 49, position_end = 96 }
clean = { tray = 6, position_start = 1, position_end = 96 }

[Evosep.Metabolomics]
# Metabolomics uses different tray allocation
blank = { tray = 6, position_start = 1, position_end = 48 }
pooledQC = { tray = 5, position_start = 1, position_end = 48 }
standard = { tray = 5, position_start = 49, position_end = 72 }
pooledQCDil1 = { tray = 5, position_start = 73, position_end = 76 }
pooledQCDil2 = { tray = 5, position_start = 77, position_end = 80 }
pooledQCDil3 = { tray = 5, position_start = 81, position_end = 84 }
pooledQCDil4 = { tray = 5, position_start = 85, position_end = 88 }
pooledQCDil5 = { tray = 5, position_start = 89, position_end = 92 }
pooledQCDil6 = { tray = 5, position_start = 93, position_end = 96 }
EquiSPLASH = { tray = 5, position_start = 49, position_end = 72 }
108mix_AA = { tray = 5, position_start = 49, position_end = 72 }
108mix_OAP = { tray = 5, position_start = 49, position_end = 72 }
