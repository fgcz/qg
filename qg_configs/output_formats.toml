# Output Format Definitions
# Maps internal fields to output column names
# See ALGORITHM.md for field documentation

[xcalibur]
description = "Thermo XCalibur sequence format (SLD-compatible)"
file_extension = ".csv"

[xcalibur.columns]
"row" = "run_number"
"run" = "run_number"
"vial" = "position"
"filename" = "file_name"
"method" = "method"
"output_path" = "data_path"

[xcalibur_qg]
description = "Legacy queue generation format"
file_extension = ".csv"

[xcalibur_qg.columns]
"File Name" = "file_name"
"Path" = "data_path"
"Instrument Method" = "method"
"Position" = "position"
"Inj Vol" = "inj_vol"
"Sample Type" = "sample_type"
"Sample Name" = "sample_name"

[chronos]
description = "Chronos autosampler format (Evosep)"
file_extension = ".csv"

[chronos.columns]
"Sample Name" = "sample_name"
"Source Vial" = "position"
"Source Tray" = "tray"
"Method" = "method"
"Data File" = "file_name"
"Xcalibur Method" = "xcalibur_method"
"Xcalibur Filename" = "file_name"
"Xcalibur Post Acquisition Program" = "post_acquisition"
"Xcalibur Output Dir" = "data_path"
"Comment" = "comment"
"Analysis Method" = "analysis_method"

[hystar]
description = "Bruker Hystar sequence format"
file_extension = ".csv"

[hystar.columns]
"Sample Name" = "sample_name"
"Sample Position" = "position"
"Method" = "method"
"Data Path" = "data_path"
"Injection Volume" = "inj_vol"
