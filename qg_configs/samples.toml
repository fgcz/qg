# QC and Standard Sample Definitions
# Structure: <technology>.<sample_id>
# Patterns reference samples by ID (e.g., "QC01", "blank")
# Technology context comes from the pattern itself

# =============================================================================
# PROTEOMICS
# =============================================================================

[proteomics.default]
description = "Default settings for user samples in proteomics workflows"
inj_vol = 2.0
file_name_template = "{date}_{run}_C{container}_{sample_name}"

[proteomics.QC01]
description = "autoQC01: Standard peptide mix for system suitability"
sample_name = "autoQC01"
inj_vol = 2.0
file_name_template = "{date}_{run}_C{container}_autoQC01"

[proteomics.QC03dda]
description = "autoQC03dda: DDA benchmark for performance monitoring"
sample_name = "autoQC03dda"
inj_vol = 1.0
file_name_template = "{date}_{run}_C{container}_autoQC03dda"

[proteomics.QC03dia]
description = "autoQC03dia: DIA benchmark for performance monitoring"
sample_name = "autoQC03dia"
inj_vol = 1.0
file_name_template = "{date}_{run}_C{container}_autoQC03dia"

[proteomics.clean]
description = "Buffer blank for column cleaning between sample batches"
sample_name = "clean"
inj_vol = 2.0
file_name_template = "{date}_{run}_C{container}_clean"

