# QC and Standard Sample Definitions
# All samples used in queue patterns are defined here
# Patterns in queue_patterns.toml reference samples by their ID (e.g., "QC01", "blank")

# =============================================================================
# PROTEOMICS QC SAMPLES
# =============================================================================

[samples.QC01]
description = "autoQC01: Standard peptide mix for system suitability"
sample_name = "autoQC01"
inj_vol = 2.0
file_name_template = "{date}_{run}_C{container}_autoQC01"

[samples.QC03dda]
description = "autoQC03dda: DDA benchmark for performance monitoring"
sample_name = "autoQC03dda"
inj_vol = 1.0
mode = "dda"
file_name_template = "{date}_{run}_C{container}_autoQC03dda"

[samples.QC03dia]
description = "autoQC03dia: DIA benchmark for performance monitoring"
sample_name = "autoQC03dia"
inj_vol = 1.0
mode = "dia"
file_name_template = "{date}_{run}_C{container}_autoQC03dia"

[samples.clean]
description = "Buffer blank for column cleaning between sample batches"
sample_name = "clean"
inj_vol = 2.0
file_name_template = "{date}_{run}_C{container}_clean"

# =============================================================================
# METABOLOMICS QC SAMPLES
# =============================================================================

[samples.blank]
description = "Solvent blank for carryover assessment"
sample_name = "blank"
inj_vol = 3.5
file_name_template = "{date}_{run}_C{container}_blank"

[samples.pooledQC]
description = "Pooled sample QC for batch correction"
sample_name = "pooledQC"
inj_vol = 3.5
file_name_template = "{date}_{run}_C{container}_pooledQC"

