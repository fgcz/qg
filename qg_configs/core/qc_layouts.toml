# QC Layouts
# Structure: <technology>.<sampler_key>
# QC sample positions per technology + physical sampler
# Key is derived from sampler path (e.g., "Vanquish.vial" or "MClass48")
#
# Grid samplers: sample_id = "position_string"
# Evosep samplers: sample_id = { tray, position_start, position_end }

# =============================================================================
# PROTEOMICS
# =============================================================================

[Proteomics.Vanquish.vial]
# QC row: F, QC plate: B
QC01 = "B:F9"
QC03dia = "B:F8"
QC03dda = "B:F8"
clean = "B:F7"

[Proteomics.Vanquish.plate]
# QC row: H, QC plate: B
QC01 = "B:H9"
QC03dia = "B:H10"
QC03dda = "B:H10"
clean = "B:H1"

[Proteomics.MClass48]
# QC row: F, QC plate: 1 (same for Vial and Plate)
QC01 = "1:F8"
QC03dia = "1:F7"
QC03dda = "1:F7"
clean = "1:F6"

[Proteomics.Evosep] 
# Position ranges within dedicated trays
# Tray 5: QC samples, Tray 6: Clean/wash
QC01 = { tray = 5, position_start = 1, position_end = 48 }
QC03dia = { tray = 5, position_start = 49, position_end = 96 }
QC03dda = { tray = 5, position_start = 49, position_end = 96 }
clean = { tray = 6, position_start = 1, position_end = 96 }

