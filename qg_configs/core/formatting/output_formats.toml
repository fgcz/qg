# Output Format Definitions
# Maps internal fields to output column names
# See ALGORITHM.md for field documentation
#
# grid_position_format: How to combine row + col for display
#   "{row},{col}"       -> "F,7"  (Xcalibur with comma)
#   "{row}{col}"        -> "F7"   (XcaliburSII, no comma)
#   "{grid_position}"   -> "15"   (Evosep integer passthrough)

[xcalibur_sld]
description = "Thermo XCalibur sequence format (SLD-compatible)"
file_extension = ".csv"
position_format = "{tray}:{grid_position}"  # e.g., "Y:A1"
grid_position_format = "{row}{col}"

[xcalibur_sld.columns]
"row" = "run_number"
"run" = "run_number"
"vial" = "position"
"filename" = "file_name"
"method" = "method"
"output_path" = "data_path"

[xcalibur]
description = "Thermo XCalibur format (Exploris 1/2, Lumos2, Qexactive 1, Vanquish instruments)"
file_extension = ".csv"
position_format = "{tray}:{grid_position}"  # e.g., "1:F,7" or "Y:A,1"
grid_position_format = "{row},{col}"

[xcalibur.columns]
"File Name" = "file_name"
"Path" = "data_path"
"Instrument Method" = "method"
"Position" = "position"
"Inj Vol" = "inj_vol"
"Sample Type" = "sample_type"
"Sample Name" = "sample_name"

[xcalibur_sii]
description = "Thermo XCalibur SII format (ASCEND_1)"
file_extension = ".csv"
position_format = "{tray}:{grid_position}"  # e.g., "1:F7"
grid_position_format = "{row}{col}"

[xcalibur_sii.columns]
"File Name" = "file_name"
"Path" = "data_path"
"Instrument Method" = "method"
"Position" = "position"
"Inj Vol" = "inj_vol"
"Sample Type" = "sample_type"
"Sample Name" = "sample_name"

[chronos]
description = "Chronos autosampler format (Evosep)"
file_extension = ".csv"
position_format = "{grid_position}"  # Evosep: position is numeric (1-96), tray is separate column
grid_position_format = "{grid_position}"

[chronos.columns]
"Sample Name" = "sample_name"
"Source Vial" = "grid_position"
"Source Tray" = "tray"
"Method" = "method"
"Data File" = "file_name"
"Xcalibur Method" = "xcalibur_method"
"Xcalibur Filename" = "file_name"
"Xcalibur Post Acquisition Program" = "post_acquisition"
"Xcalibur Output Dir" = "data_path"
"Comment" = "comment"
"Analysis Method" = "analysis_method"

[hystar]
description = "Bruker HyStar sequence format for TimsTOF"
file_extension = ".csv"
position_format = "S{tray}-{grid_position}"  # e.g., "S1-A1"
grid_position_format = "{row}{col}"

[hystar.columns]
"Position" = "position"
"SampleID" = "file_name"
"Volume" = "inj_vol"
"DataPath" = "data_path"
"SuperMethod" = "method"
# SampleComment, ResultDatafile, ACQEND_EXECUTE - added by XML writer (hardcoded/derived)
