# Queue Patterns
# Structure: <tech_area>.<pattern_name>
# Each pattern specifies QC sample injection sequences
# Sample IDs reference samples from samples.csv under the same tech_area
#
# PROTEOMICS patterns: noqc, standard, frequent, simple, dda, minimal, qc_only, evosep_qc, conditioning
# METABOLOMICS patterns: noqc, standard, simple, blank
# LIPIDOMICS patterns: noqc, standard
#
# [Proteomics.standard] Based on Notes.md analysis: clean-qc order (97%), clean-qc-qc ending dominant
# [Proteomics.standard] separation field: injected between project groups
# [Metabolomics.standard] Complex start sequence: blank -> standard+pooledQC -> blank -> 6x dilution series -> blank
# [Metabolomics.standard] middle: regular QC pattern; middle_extended: dilution series at 2x frequency
# [Metabolomics.standard] separation field: injected between project groups
# [Lipidomics.standard] separation field: injected between project groups

[Proteomics.noqc]
description = "No QC - no QC samples"
qc_layout_name = "standard"
run_QC_after_n_samples = 1000
start = []
middle = []
end = []

[Proteomics.standard]
description = "Standard proteomics: clean-qc pairs, clean-qc-qc ending"
qc_layout_name = "standard"
run_QC_after_n_samples = 16
start = ["QC03dia", "QC01"]
middle = ["clean", "QC01"]
end = ["clean", "QC01", "QC03dia", "clean"]
separation = ["clean", "QC01", "clean"]

[Proteomics.frequent]
description = "Frequent QC (every 8 samples) for sensitive experiments"
qc_layout_name = "standard"
run_QC_after_n_samples = 8
start = ["QC03dia", "QC01"]
middle = ["clean", "QC01"]
end = ["clean", "QC01", "QC03dia", "clean"]

[Proteomics.simple]
description = "Simple: QC only, no column cleaning in middle"
qc_layout_name = "standard"
run_QC_after_n_samples = 16
start = ["QC01"]
middle = ["QC01"]
end = ["clean", "QC01", "QC03dda"]

[Proteomics.dda]
description = "DDA-focused pattern using QC03dda benchmark"
qc_layout_name = "standard"
run_QC_after_n_samples = 16
start = ["QC03dda", "QC01"]
middle = ["clean", "QC01"]
end = ["clean", "QC01", "QC03dda", "clean"]

[Proteomics.minimal]
description = "Minimal QC for high-throughput runs"
qc_layout_name = "standard"
run_QC_after_n_samples = 32
start = ["QC01"]
middle = ["QC01"]
end = ["clean", "QC01"]

[Proteomics.qc_only]
description = "QC only - no samples, just system check"
qc_layout_name = "standard"
run_QC_after_n_samples = 1
start = ["clean", "QC01", "QC03dia"]
middle = []
end = ["QC01", "QC03dia", "clean"]

[Proteomics.evosep_qc]
description = "Evosep: clean-QC03 bookends, no QC01"
qc_layout_name = "evosep_qc"
run_QC_after_n_samples = 12
start = ["clean", "QC03dia"]
middle = ["QC03dia"]
end = ["clean", "QC03dia"]

[Proteomics.conditioning]
description = "Column conditioning - multiple cleans"
qc_layout_name = "standard"
run_QC_after_n_samples = 1
start = ["clean", "clean", "clean", "QC01"]
middle = []
end = ["clean"]

[Metabolomics.noqc]
description = "No QC - no QC samples"
qc_layout_name = "standard"
run_QC_after_n_samples = 1
start = []
middle = []
end = []

[Metabolomics.standard]
description = "Standard metabolomics with dilution series for linearity"
qc_layout_name = "standard"
run_QC_after_n_samples = 10
start = ["blank", "108mix_AA", "108mix_OAP", "pooledQC", "blank", "pooledQCDil1", "pooledQCDil2", "pooledQCDil3", "pooledQCDil4", "pooledQCDil5", "pooledQCDil6", "blank"]
middle = ["blank", "108mix_AA", "108mix_OAP", "pooledQC"]
end = ["108mix_AA", "108mix_OAP", "pooledQC", "blank"]
separation = ["blank", "pooledQC"]
middle_extended = ["pooledQCDil1", "pooledQCDil2", "pooledQCDil3", "pooledQCDil4", "pooledQCDil5", "pooledQCDil6"]
middle_extended_frequency_multiplier = 2

[Metabolomics.simple]
description = "Simple metabolomics without dilution series"
qc_layout_name = "standard"
run_QC_after_n_samples = 10
start = ["blank", "108mix_AA", "108mix_OAP", "pooledQC", "blank"]
middle = ["blank", "pooledQC"]
end = ["108mix_AA", "108mix_OAP", "pooledQC", "blank"]

[Metabolomics.blank]
description = "Blank runs only for system conditioning"
qc_layout_name = "standard"
run_QC_after_n_samples = 10
start = ["blank", "blank", "blank"]
middle = []
end = ["blank", "blank", "blank"]

[Lipidomics.noqc]
description = "No QC - no QC samples"
qc_layout_name = "standard"
run_QC_after_n_samples = 1
start = []
middle = []
end = []

[Lipidomics.standard]
description = "Lipidomics with EquiSPLASH standard"
qc_layout_name = "standard"
run_QC_after_n_samples = 10
start = ["blank", "EquiSPLASH", "pooledQC", "blank", "pooledQCDil1", "pooledQCDil2", "pooledQCDil3", "pooledQCDil4", "pooledQCDil5", "pooledQCDil6", "blank"]
middle = ["blank", "EquiSPLASH", "pooledQC"]
end = ["EquiSPLASH", "pooledQC", "blank"]
separation = ["blank", "pooledQC"]
middle_extended = ["pooledQCDil1", "pooledQCDil2", "pooledQCDil3", "pooledQCDil4", "pooledQCDil5", "pooledQCDil6"]
middle_extended_frequency_multiplier = 2
