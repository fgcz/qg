# =============================================================================
# Evosep Samplers
# Different model: position (1-96) + tray (slot number) as separate fields
# Grid per tray: 8 rows (A-H) x 12 cols = 96 positions
# Output uses "Source Vial" (position) and "Source Tray" (tray number)
# =============================================================================

[Evosep_Vial_Chronos]
description = "Evosep One, vials/tips, Chronos control"
sampler_base = "Evosep"
container_type = "Vial"
software = "Chronos"
output_format = "chronos"
position_source = "generated"
fill_order = "sequential"
position_type = "tray_position"
slots = [1, 2, 3, 4]
positions_per_slot = 96

