repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run --group dev python -m pyright
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest
        # GUI tests under tests/gui/ spawn uvicorn + headless Chromium and take
        # ~1 min; that's too slow for every commit. Run them in CI or explicitly
        # via `uv run pytest tests/gui/`.
        entry: uv run pytest -x -q --ignore=tests/gui
        language: system
        types: [python]
        pass_filenames: false
