name: security

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install
      - name: Sync locked environment
        run: uv sync --frozen
      - name: Audit installed dependencies
        run: uv run --no-sync pip-audit --local --skip-editable --progress-spinner=off
