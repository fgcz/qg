site_name: Queue Generation System
site_description: Generate sample queues with QC injections for mass spectrometry instruments (XCalibur, Chronos, Hystar).
repo_url: https://gitlab.bfabric.org/wolski/qg
repo_name: wolski/qg
docs_dir: docs
site_dir: public
# Emit real .html files with relative links so the site can be browsed
# directly from disk (file://) without a web server.
use_directory_urls: false

exclude_docs: |
  Makefile
  *.html
  *.pdf
  *.docx

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - content.code.copy
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets

nav:
  - Home: index.md
  - User Guide:
      - Local app (no B-Fabric): users/local_app.md
      - Example sample tables: examples/README.md
      - User modes (auth): users/user_modes.md
      - Config editor: users/editor_guide.md
  - Reference:
      - Algorithm: reference/algorithm.md
      - Configuration: reference/config.md
  - Developers:
      - Deployment: developers/deployment.md
      - History: developers/history.md
